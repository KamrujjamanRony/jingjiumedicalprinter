@if (bc.breadcrumbs().length > 0) {
  <div class="max-w-8xl mx-auto px-4">
    <nav class="flex max-w-8xl" aria-label="Breadcrumb">
      <ol class="inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse">
        <li class="inline-flex items-center">
          <a
            routerLink="/"
            class="inline-flex items-center text-sm font-medium text-body hover:text-fg-brand"
          >
            <svg
              class="w-4 h-4 me-1.5"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m4 12 8-8 8 8M6 10.5V19a1 1 0 0 0 1 1h3v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h3a1 1 0 0 0 1-1v-8.5"
              />
            </svg>
            Home
          </a>
        </li>
        <li>
          <div class="flex items-center space-x-1.5">
            <svg
              class="w-3.5 h-3.5 rtl:rotate-180 text-body"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m9 5 7 7-7 7"
              />
            </svg>
          </div>
        </li>
        @for (crumb of bc.breadcrumbs(); track crumb.url; let last = $last) {
          <li>
            <div class="flex items-center space-x-1.5">
              @if (!$first) {
                <svg class="w-3.5 h-3.5 rtl:rotate-180 text-body" viewBox="0 0 24 24" fill="none">
                  <path
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m9 5 7 7-7 7"
                  />
                </svg>
              }

              @if (!last) {
                <a
                  [routerLink]="crumb.url"
                  class="inline-flex items-center text-sm font-medium text-body hover:text-fg-brand capitalize"
                >
                  {{ crumb.label }}
                </a>
              } @else {
                <span
                  class="inline-flex items-center text-sm font-medium text-body-subtle capitalize"
                  aria-current="page"
                >
                  {{ crumb.label }}
                </span>
              }
            </div>
          </li>
        }
      </ol>
    </nav>
  </div>
}
